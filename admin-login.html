<!-- public/admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — UPSA E-Complaint</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">🔐</div>
                <h1>Admin Portal</h1>
                <p>Authorized administrative access only</p>
            </div>

            <div class="alert alert-error" id="alertError"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <input type="text" id="username" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="adminLoginBtn">
                    Sign In to Admin Panel
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="/">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
